<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="nluTitle nluDesc">
  <title id="nluTitle">Memory-network NLU routing</title>
  <desc id="nluDesc">User utterance fused with rules and memory network to produce a domain decision</desc>
  <rect width="720" height="280" fill="#faf9f5"/>

  <rect x="40" y="112" width="140" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="110" y="146" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">Utterance</text>

  <rect x="250" y="40" width="160" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="330" y="74" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">Rule memory</text>

  <rect x="250" y="184" width="160" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="330" y="218" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">Learned reps</text>

  <rect x="290" y="112" width="120" height="56" rx="8" fill="#e8e6dc" stroke="#d97757" stroke-width="2"/>
  <text x="350" y="146" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#141413">Fuse</text>

  <rect x="520" y="112" width="160" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="600" y="138" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">Domain</text>
  <text x="600" y="156" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#5e5d59">~65% ’ ~85%</text>

  <line x1="180" y1="140" x2="290" y2="140" stroke="#141413" stroke-width="1.5"/>
  <line x1="330" y1="96" x2="340" y2="112" stroke="#d97757" stroke-width="1.5"/>
  <line x1="330" y1="184" x2="340" y2="168" stroke="#d97757" stroke-width="1.5"/>
  <line x1="410" y1="140" x2="520" y2="140" stroke="#141413" stroke-width="1.5"/>

  <text x="360" y="260" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-size="13" fill="#5e5d59">Rules + neural memory · diagnosable routing</text>
</svg>
