<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="tbTitle tbDesc">
  <title id="tbTitle">Standalone TensorBoard ecosystem</title>
  <desc id="tbDesc">TensorBoard core shared by TensorFlow, MXNet via mxboard, and PyTorch via tensorboardX</desc>
  <rect width="720" height="280" fill="#faf9f5"/>
  <rect x="250" y="95" width="220" height="90" rx="8" fill="#e8e6dc" stroke="#d1cfc5"/>
  <text x="360" y="135" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#141413">Standalone</text>
  <text x="360" y="158" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#141413">TensorBoard</text>
  <text x="360" y="178" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#5e5d59">dmlc/tensorboard</text>

  <rect x="40" y="40" width="150" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="115" y="74" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">TensorFlow</text>

  <rect x="40" y="184" width="150" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="115" y="218" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">MXNet / mxboard</text>

  <rect x="530" y="112" width="150" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="605" y="146" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">PyTorch / X</text>

  <line x1="190" y1="68" x2="250" y2="120" stroke="#d97757" stroke-width="2"/>
  <line x1="190" y1="212" x2="250" y2="160" stroke="#d97757" stroke-width="2"/>
  <line x1="470" y1="140" x2="530" y2="140" stroke="#d97757" stroke-width="2"/>

  <text x="360" y="250" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-size="13" fill="#5e5d59">One inspection layer · many frameworks</text>
</svg>
