<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="ilTitle ilDesc">
  <title id="ilTitle">Indicator Loss ASR gating</title>
  <desc id="ilDesc">Audio and bias list enter an ASR decoder with an explicit indicator gate producing recognized text</desc>
  <rect width="720" height="280" fill="#faf9f5"/>

  <rect x="40" y="50" width="140" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="110" y="84" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">Audio</text>

  <rect x="40" y="174" width="140" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="110" y="208" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">Bias list</text>

  <rect x="260" y="95" width="200" height="90" rx="8" fill="#e8e6dc" stroke="#d1cfc5"/>
  <text x="360" y="130" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#141413">ASR Decoder</text>
  <rect x="290" y="145" width="140" height="28" rx="4" fill="#d97757"/>
  <text x="360" y="164" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Indicator Gate</text>

  <rect x="540" y="112" width="140" height="56" rx="8" fill="#f0eee6" stroke="#d1cfc5"/>
  <text x="610" y="146" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#141413">Text</text>

  <line x1="180" y1="78" x2="260" y2="125" stroke="#141413" stroke-width="1.5"/>
  <line x1="180" y1="202" x2="260" y2="160" stroke="#d97757" stroke-width="2"/>
  <line x1="460" y1="140" x2="540" y2="140" stroke="#141413" stroke-width="1.5"/>

  <text x="360" y="250" text-anchor="middle" font-family="Source Serif 4, Georgia, serif" font-size="13" fill="#5e5d59">Explicit step-level gating · inspectable biasing</text>
</svg>
